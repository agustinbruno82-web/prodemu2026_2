# Copiar este archivo a: .github/workflows/resultados.yml
# en el repo agustinbruno82-web/prodemu2026_2

name: Actualizar resultados PRODEMU

on:
  schedule:
    # Cada 10 minutos durante el Mundial (jun-jul 2026, hora UTC).
    # GitHub suele saltear corridas programadas; pedir más seguido hace que
    # igual caiga alguna cerca del final de cada partido.
    - cron: "*/10 * 11-30 6 *"
    - cron: "*/10 * 1-19 7 *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Modo prueba (no escribe en Firebase)"
        type: boolean
        default: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backup de la base completa
        run: |
          # La base ahora exige login: pedimos un token anónimo (la API key es pública).
          TOKEN=$(curl -s "https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=AIzaSyAk9rmCeKgYIMv7Fngul6RPv7r09-OE0YA" \
            -H "Content-Type: application/json" -d '{"returnSecureToken":true}' | jq -r .idToken)
          curl -s "https://prodemu-default-rtdb.firebaseio.com/.json?auth=$TOKEN" -o backup.json

      - name: Guardar backup (se conserva 2 días)
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}
          path: backup.json
          retention-days: 2

      - name: Cargar resultados en Firebase
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: python3 agente-resultados/actualizar_resultados.py
