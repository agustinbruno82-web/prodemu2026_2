<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRODEMU 2026 – Mundial USA · Canadá · México</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <style>
    :root {
      --pri:#1a2c5b; --pri2:#2d4a8a; --gold:#c8a84b; --red:#dc2626;
      --green:#16a34a; --amber:#d97706; --bg:#eef2f7; --card:#fff;
      --gray:#6b7280; --lgray:#e5e7eb; --text:#111827;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* ── Utilities ── */
    .hidden{display:none!important} .flex{display:flex} .between{display:flex;justify-content:space-between;align-items:center}
    .mt1{margin-top:6px} .mt2{margin-top:12px} .mt3{margin-top:20px} .mb2{margin-bottom:12px} .mb3{margin-bottom:20px}
    .w100{width:100%} .bold{font-weight:700} .sm{font-size:.82rem} .xs{font-size:.74rem} .muted{color:var(--gray)}
    .tc{text-align:center} .tr{text-align:right}
    code{background:#f3f4f6;padding:1px 5px;border-radius:4px;font-size:.82rem}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:8px;
         font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
    .btn:disabled{opacity:.5;cursor:not-allowed} .btn:active:not(:disabled){transform:scale(.97)}
    .btn-pri{background:var(--pri);color:#fff} .btn-pri:hover:not(:disabled){background:var(--pri2)}
    .btn-gold{background:var(--gold);color:#fff} .btn-gold:hover:not(:disabled){opacity:.9}
    .btn-red{background:var(--red);color:#fff}   .btn-red:hover:not(:disabled){opacity:.9}
    .btn-grn{background:var(--green);color:#fff} .btn-grn:hover:not(:disabled){opacity:.9}
    .btn-out{background:transparent;border:2px solid var(--pri);color:var(--pri)} .btn-out:hover:not(:disabled){background:var(--pri);color:#fff}
    .btn-sm{padding:5px 12px;font-size:.78rem}

    /* ── Forms ── */
    .field{margin-bottom:14px}
    .field label{display:block;font-size:.78rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
    .field input,.field select{width:100%;padding:10px 14px;border:2px solid var(--lgray);border-radius:8px;font-size:.95rem;outline:none;transition:border-color .15s}
    .field input:focus,.field select:focus{border-color:var(--pri)}
    .si{width:50px;height:42px;text-align:center;font-size:1.1rem;font-weight:700;border:2px solid var(--lgray);
        border-radius:8px;outline:none;transition:border-color .15s}
    .si:focus{border-color:var(--pri)} .si:disabled{background:#f9fafb;color:var(--gray)}

    /* ── Alerts ── */
    .alert{padding:11px 16px;border-radius:8px;font-size:.88rem}
    .alert-warn{background:#fffbeb;border-left:4px solid var(--amber);color:#78350f}
    .alert-ok{background:#f0fdf4;border-left:4px solid var(--green);color:#14532d}
    .alert-err{background:#fef2f2;border-left:4px solid var(--red);color:#7f1d1d}
    .alert-info{background:#eff6ff;border-left:4px solid var(--pri);color:#1e3a8a}

    /* ── Chat ── */
    .chat-row{display:flex;margin-bottom:10px}
    .chat-row.mine{justify-content:flex-end}
    .chat-bubble{max-width:78%;background:#fff;border:1px solid var(--lgray);border-radius:12px;padding:7px 11px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
    .chat-row.mine .chat-bubble{background:#e7eefb;border-color:#cfddf7}
    .chat-meta{display:flex;align-items:center;gap:8px;margin-bottom:2px}
    .chat-name{font-size:.74rem;font-weight:700;color:var(--pri)}
    .chat-time{font-size:.66rem;color:var(--gray)}
    .chat-del{margin-left:auto;background:none;border:none;color:var(--red);cursor:pointer;font-size:.8rem;line-height:1;padding:0 2px}
    .chat-reply{background:none;border:none;color:var(--pri);cursor:pointer;font-size:.78rem;line-height:1;padding:0 2px}
    .chat-bubble.priv{background:#fff7e6;border-color:#f3d488}
    .chat-row.mine .chat-bubble.priv{background:#fdeccf;border-color:#eecb8a}
    .chat-priv-badge{display:inline-block;font-size:.62rem;font-weight:700;color:#9a6b00;background:#fde9bf;border:1px solid #f0d089;border-radius:10px;padding:1px 7px;margin-bottom:3px}
    .chat-privchk{display:flex;align-items:center;gap:7px;font-size:.8rem;color:var(--gray);padding:8px 14px 0;cursor:pointer;user-select:none}
    .chat-privchk input{width:16px;height:16px;cursor:pointer}
    .chat-privbar{display:flex;align-items:center;gap:8px;font-size:.82rem;color:#9a6b00;background:#fff7e6;border-top:1px solid #f0d089;padding:8px 14px}
    .chat-privbar button{margin-left:auto;background:none;border:none;color:var(--red);cursor:pointer;font-size:.9rem}
    .chat-text{font-size:.9rem;color:var(--text);word-wrap:break-word;white-space:pre-wrap}

    /* ── Cards ── */
    .card{background:var(--card);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
    .card-title{font-size:1rem;font-weight:700;color:var(--pri);margin-bottom:14px}

    /* ── Stats ── */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
    .stat-box{background:var(--card);border-radius:10px;padding:14px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.06)}
    .stat-val{font-size:1.9rem;font-weight:800;color:var(--pri)}
    .stat-lbl{font-size:.72rem;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

    /* ── Progress ── */
    .pbar{height:8px;background:var(--lgray);border-radius:4px;overflow:hidden}
    .pfill{height:100%;background:linear-gradient(90deg,var(--pri),var(--gold));border-radius:4px;transition:width .3s}

    /* ── Ranking table ── */
    .rt{width:100%;border-collapse:collapse}
    .rt th{background:var(--pri);color:#fff;padding:10px 12px;text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}
    .rt td{padding:10px 12px;border-bottom:1px solid var(--lgray);font-size:.88rem}
    .rt tr:hover td{background:#f9fafb}
    .rt-gold td{background:linear-gradient(90deg,#fff8e1,#fff)!important}
    .rt-silver td{background:linear-gradient(90deg,#f5f5f5,#fff)!important}
    .rt-bronze td{background:linear-gradient(90deg,#fff3e0,#fff)!important}
    .rn{font-weight:800;font-size:1rem}
    .rt-gold .rn{color:#b8860b} .rt-silver .rn{color:#9ca3af} .rt-bronze .rn{color:#cd7f32}
    .pts-big{font-weight:800;font-size:1.05rem;color:var(--pri)}

    /* ── Badges ── */
    .badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:12px;font-size:.72rem;font-weight:700}
    .b-grn{background:#dcfce7;color:#166534} .b-amb{background:#fef9c3;color:#713f12}
    .b-gray{background:var(--lgray);color:var(--gray)} .b-red{background:#fee2e2;color:#991b1b}
    .b-pts4{background:var(--green);color:#fff} .b-pts3{background:#0ea5e9;color:#fff}
    .b-pts1{background:var(--amber);color:#fff} .b-pts0{background:var(--lgray);color:var(--gray)}

    /* ── Chips ── */
    .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:.8rem;font-weight:600}
    .chip-grn{background:#dcfce7;color:#15803d} .chip-red{background:#fee2e2;color:#dc2626}
    .chip-dot{width:7px;height:7px;border-radius:50%;background:currentColor}

    /* ── Match rows ── */
    .grp-wrap{border:2px solid var(--lgray);border-radius:10px;margin-bottom:16px;overflow:hidden}
    .grp-head{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;padding:11px 16px;font-weight:700;font-size:.95rem}
    .grp-inner{display:grid;grid-template-columns:1fr 220px}
    .match-col{border-right:2px solid var(--lgray)}
    .match-wrap{border-bottom:1px solid var(--lgray)}
    .match-wrap:last-child{border-bottom:none}
    .match-wrap:hover{background:#fafafa}
    .match-info{display:flex;align-items:center;gap:6px;padding:5px 14px 0;font-size:.68rem;color:var(--gray)}
    .match-info .mi-date{font-weight:700;color:var(--pri)}
    .match-info .mi-sede{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .match-row{display:grid;grid-template-columns:1fr 54px 28px 54px 1fr;align-items:center;
               gap:6px;padding:6px 14px 9px}
    .match-row:hover{background:transparent}
    .mteam-h{text-align:right;font-weight:600;font-size:.9rem}
    .mteam-a{text-align:left;font-weight:600;font-size:.9rem}
    .vs-box{text-align:center;font-size:.72rem;color:var(--gray);line-height:1.3}

    /* ── Group standings (live) ── */
    .gt-panel{padding:10px 12px;font-size:.78rem}
    .gt-panel table{width:100%;border-collapse:collapse}
    .gt-panel th{font-size:.7rem;font-weight:700;color:var(--gray);padding:3px 6px;border-bottom:1px solid var(--lgray)}
    .gt-panel td{padding:4px 6px;white-space:nowrap}
    .gt-q1{background:#dcfce7} .gt-q2{background:#dbeafe} .gt-q3{background:#fef9c3} .gt-q4{}
    .gt-title{font-size:.72rem;font-weight:700;color:var(--pri);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
    .gt-legend{font-size:.62rem;color:var(--gray);margin-top:6px;line-height:1.5}

    /* ── Sticky save ── */
    .save-bar{position:sticky;bottom:0;background:#fff;padding:14px 20px;
              box-shadow:0 -4px 14px rgba(0,0,0,.09);display:flex;align-items:center;
              justify-content:space-between;gap:12px;z-index:50;border-top:2px solid var(--lgray)}

    /* ── Header & Nav ── */
    .hdr{background:linear-gradient(135deg,var(--pri) 0%,var(--pri2) 100%);color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.2)}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;gap:12px;flex-wrap:wrap}
    .logo-txt{font-size:1.45rem;font-weight:900;letter-spacing:1px}
    .logo-sub{font-size:.7rem;opacity:.8;letter-spacing:.5px;margin-top:1px}
    .hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .hdr-user{font-size:.85rem;opacity:.9}
    .btn-logout{padding:5px 12px;background:rgba(255,255,255,.18);color:#fff;
                border:1px solid rgba(255,255,255,.35);border-radius:6px;font-size:.8rem;cursor:pointer}
    .btn-logout:hover{background:rgba(255,255,255,.28)}
    nav{display:flex;background:rgba(0,0,0,.2);overflow-x:auto}
    .nav-btn{flex:0 0 auto;padding:10px 14px;background:none;border:none;color:rgba(255,255,255,.7);
             cursor:pointer;font-size:.82rem;font-weight:500;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
    .nav-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
    .nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:700}

    /* ── Login ── */
    .login-wrap{display:flex;justify-content:center;align-items:center;min-height:100vh;
                background:linear-gradient(160deg,#0a1628 0%,#1a2c5b 40%,#2d4a8a 70%,#74a8c4 100%);
                position:relative;overflow:hidden}
    .login-wrap::after{content:'';display:none}
    .login-players{position:absolute;bottom:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
    .login-card{background:#fff;border-radius:18px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.45);position:relative;z-index:1}
    .login-emoji{font-size:3.5rem;text-align:center;margin-bottom:10px}
    .login-title{text-align:center;margin-bottom:24px}
    .login-title h1{font-size:2rem;font-weight:900;color:var(--pri);letter-spacing:2px}
    .login-title p{color:var(--gray);font-size:.85rem;margin-top:4px}

    /* ── Login lateral de jugadores ── */
    .login-players-panel{display:none;position:relative;flex:1;overflow:hidden;min-height:100vh;
      background:linear-gradient(160deg,#0a1628 0%,#1a2c5b 60%,#0d2040 100%);
      align-items:center;justify-content:center;flex-direction:column;gap:24px}
    @media(min-width:900px){.login-players-panel{display:flex}}
    .lp-title{color:#fff;text-align:center;z-index:3}
    .lp-title h2{font-size:1.6rem;font-weight:900;letter-spacing:3px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
    .lp-title p{font-size:.8rem;opacity:.6;margin-top:4px;letter-spacing:1px}
    /* Panini sticker card */
    .panini-card{width:240px;border-radius:14px;overflow:hidden;position:relative;z-index:3;
      box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.15);
      font-family:'Segoe UI',Arial,sans-serif}
    .panini-bg{background:#3bbfbc;position:relative;height:300px;overflow:hidden}
    .panini-num{position:absolute;left:-10px;top:50%;transform:translateY(-50%);
      font-size:11rem;font-weight:900;color:rgba(255,255,255,.15);line-height:1;
      letter-spacing:-8px;pointer-events:none;user-select:none}
    .panini-fifa{position:absolute;top:10px;right:10px;text-align:center}
    .panini-fifa svg{display:block;margin:0 auto}
    .panini-fifa-txt{color:rgba(255,255,255,.9);font-size:8px;font-weight:900;letter-spacing:2px;margin-top:2px}
    .panini-flag{position:absolute;bottom:60px;right:10px;width:36px;height:36px;border-radius:50%;overflow:hidden;
      border:2px solid rgba(255,255,255,.6)}
    .panini-photo{position:absolute;bottom:0;left:0;right:0;
      display:flex;align-items:flex-end;justify-content:center;height:100%}
    .panini-photo img{height:280px;object-fit:cover;object-position:top center;width:100%}
    .panini-info{background:#2a9490;padding:10px 12px 8px}
    .panini-name{color:#fff;font-size:.9rem;line-height:1.2}
    .panini-name span{font-weight:400}
    .panini-name strong{font-weight:900}
    .panini-data{color:rgba(255,255,255,.75);font-size:.62rem;margin-top:3px;letter-spacing:.3px}
    .panini-club-row{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
    .panini-club{color:rgba(255,255,255,.75);font-size:.6rem;letter-spacing:.3px}
    .panini-logo{background:#f5c518;color:#d4380d;font-size:.55rem;font-weight:900;
      padding:2px 5px;border-radius:3px;letter-spacing:.5px}

    /* ── Fase 2 Bracket ── */
    .f2-round{margin-bottom:18px}
    .f2-rhead{background:linear-gradient(135deg,#1a2c5b,#2d4a8a);color:#fff;padding:10px 16px;
      font-weight:700;font-size:.92rem;border-radius:10px 10px 0 0;display:flex;align-items:center;gap:8px}
    .f2-pts-badge{background:#c8a84b;color:#fff;font-size:.65rem;font-weight:900;
      padding:2px 8px;border-radius:10px}
    .f2-matches{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:8px;padding:10px;background:var(--card);border:2px solid var(--lgray);
      border-top:none;border-radius:0 0 10px 10px}
    .f2-match{border:2px solid var(--lgray);border-radius:8px;overflow:hidden}
    .f2-mnum{font-size:.62rem;color:var(--gray);padding:3px 8px;background:#f9fafb;
      text-align:center;border-bottom:1px solid var(--lgray)}
    .f2-btn{width:100%;padding:8px 12px;border:none;border-top:1px solid var(--lgray);
      background:#fff;cursor:pointer;font-size:.85rem;font-weight:600;text-align:left;
      transition:background .12s;display:block}
    .f2-btn:hover:not(:disabled){background:#eff6ff}
    .f2-btn:disabled{cursor:default;opacity:.85}
    .f2-btn.f2-sel{background:#1a2c5b;color:#fff}
    .f2-btn.f2-win{background:#16a34a;color:#fff}
    .f2-btn.f2-loss{background:#fee2e2;color:#dc2626;text-decoration:line-through}
    .f2-btn.f2-real{background:#f0fdf4;color:#15803d;font-weight:800}
    .f2-admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
    @media(max-width:600px){.f2-admin-grid{grid-template-columns:1fr}}

    /* ── Fase 2 · Cuadro visual (llave eliminatoria) ── */
    .cz-wrap{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding:4px 2px 12px}
    .cz{display:flex;align-items:flex-start;width:max-content;--ln:#cdb978}
    .cz-col{display:flex;flex-direction:column;margin-right:30px;flex:0 0 auto}
    .cz-col:last-child{margin-right:0}
    .cz-h{height:34px;display:flex;align-items:center;justify-content:center;gap:6px;
      font-size:.72rem;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--pri),var(--pri2));
      border-radius:8px;padding:0 8px;white-space:nowrap;letter-spacing:.3px;margin-bottom:4px}
    .cz-pts{background:var(--gold);color:#fff;font-size:.6rem;font-weight:900;padding:1px 6px;border-radius:10px}
    .cz-cnt{font-size:.62rem;font-weight:700;color:rgba(255,255,255,.82)}
    .cz-slot{position:relative;display:flex;align-items:center;justify-content:center}
    .cz-cell{width:150px;border:2px solid var(--lgray);border-radius:8px;overflow:hidden;
      background:#fff;position:relative;z-index:1;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .cz-team{display:block;width:100%;box-sizing:border-box;border:none;border-bottom:1px solid var(--lgray);
      background:#fff;color:var(--text);font-size:.76rem;font-weight:600;text-align:left;height:26px;line-height:26px;padding:0 9px;
      cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .12s}
    .cz-team:last-child{border-bottom:none}
    .cz-team:hover:not(:disabled):not(.sel):not(.win):not(.loss):not(.real){background:#eff6ff}
    .cz-team:disabled{cursor:default}
    .cz-team.sel{background:var(--pri);color:#fff}
    .cz-team.win{background:var(--green);color:#fff}
    .cz-team.loss{background:#fee2e2;color:#dc2626;text-decoration:line-through}
    .cz-team.real{background:#f0fdf4;color:#15803d;font-weight:800}
    .cz-team.empty{color:var(--gray);font-style:italic;cursor:default;background:#fafafa}
    .cz-conn{position:absolute;right:100%;width:30px;top:50%;transform:translateY(-50%);border-right:2px solid var(--ln)}
    .cz-conn::before,.cz-conn::after{content:'';position:absolute;right:0;width:30px;height:2px;background:var(--ln)}
    .cz-conn::before{top:0}.cz-conn::after{bottom:0}
    .cz-conn1{position:absolute;right:100%;width:30px;height:2px;top:50%;background:var(--ln)}
    .cz-champ{width:150px;padding:14px 9px;border:2px solid var(--gold);border-radius:8px;text-align:center;
      font-size:.85rem;font-weight:800;color:var(--gray);background:#fff;position:relative;z-index:1}
    .cz-champ.on{background:linear-gradient(135deg,#fff8e1,#fff);color:#7a5c00}
    .cz-champ.ok{background:var(--green);color:#fff;border-color:var(--green)}
    .cz-champ.bad{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
    .cz-hint{font-size:.72rem;color:var(--gray);margin-bottom:8px;display:flex;align-items:center;gap:5px}
    /* Small player strip inside app */
    .player-strip{background:linear-gradient(90deg,#0a1628,#1a2c5b,#0a1628);
      display:flex;align-items:center;gap:0;overflow:hidden;height:64px;position:relative}
    .player-strip::before{content:'';position:absolute;inset:0;
      background:repeating-linear-gradient(90deg,rgba(108,180,228,.08) 0,rgba(108,180,228,.08) 24px,transparent 24px,transparent 48px);
      pointer-events:none}
    .ps-img{height:64px;width:auto;object-fit:cover;object-position:top;
      filter:grayscale(20%) brightness(1.05);transition:filter .3s;flex-shrink:0}
    .ps-img:hover{filter:none}
    .ps-label{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
      font-size:.55rem;color:rgba(255,255,255,.5);letter-spacing:.5px;white-space:nowrap}
    /* ── Chat: respuestas, menciones y emojis ── */
    .chat-quote{background:rgba(26,44,91,.08);border-left:3px solid var(--pri2);
      padding:5px 9px;border-radius:6px;margin:4px 0 6px;font-size:.78rem;color:#444;
      cursor:pointer;line-height:1.3;word-break:break-word}
    .chat-quote b{color:var(--pri)}
    .mention{color:var(--pri2);font-weight:700;background:rgba(45,74,138,.1);border-radius:4px;padding:0 3px}
    .chat-replybar{display:flex;align-items:center;gap:8px;padding:8px 14px;
      background:#eef2fb;border-top:1px solid var(--lgray);font-size:.82rem}
    .chat-replybar-txt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#555}
    .chat-replybar button{border:none;background:none;cursor:pointer;font-size:.95rem;color:#666}

</head>

async function hashPwd(p){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p+'::prodemu2026::salt'));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function toast(msg,type='info'){
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3200);
}
function calcPts(pred,res){
  if(!res||res.home===''||res.away===''||res.home==null||res.away==null)return null;
  if(!pred||pred.home===''||pred.away===''||pred.home==null||pred.away==null)return{r:0,e:0,t:0};
  const ph=+pred.home,pa=+pred.away,rh=+res.home,ra=+res.away;
  const pw=ph>pa?'H':ph<pa?'A':'D',rw=rh>ra?'H':rh<ra?'A':'D';
  const r=pw===rw?3:0,e=(ph===rh&&pa===ra)?1:0;
  return{r,e,t:r+e};
}
function userScore(uid){
  const p=allPreds[uid]||{};let r=0,e=0,t=0,played=0;
  for(const m of PARTIDOS){const pts=calcPts(p[m.id],allResults[m.id]);if(pts!==null){r+=pts.r;e+=pts.e;t+=pts.t;played++;}}
  return{r,e,t,played};
}
function userTiebreakers(uid){
  const preds=allPreds[uid]||{},user=allUsers[uid]||{};
  let tb1=0;
  for(const m of PARTIDOS){const pts=calcPts(preds[m.id],allResults[m.id]);if(pts!==null&&pts.r===3)tb1++;}
  let tb2=0,tb3=0;
  if(Object.keys(allResults).length>0){
    const rt=allTables(allResults),pt=allTables(preds);
    for(let i=0;i<GRUPOS.length;i++){
      const r=rt[i].tabla,p=pt[i].tabla;
      if(r[0]&&p[0]&&r[0].name===p[0].name)tb3++;
      const rTop=new Set([r[0]?.name,r[1]?.name].filter(Boolean));
      [p[0]?.name,p[1]?.name].filter(Boolean).forEach(t=>{if(rTop.has(t))tb2++;});
    }
  }
  return{tb1,tb2,tb3,tb4:user.predSubmittedAt||user.createdAt||Date.now()};
}
function countDone(uid){
  const p=allPreds[uid]||{};
  return PARTIDOS.filter(m=>{const x=p[m.id];return x&&x.home!=null&&x.home!==''&&x.away!=null&&x.away!==''}).length;
}

function dbSet(path,val){
  if(fbOk)return db.ref(path).set(val);
  const parts=path.split('/');let obj=JSON.parse(localStorage.getItem('pm26')||'{}'),cur=obj;
  for(let i=0;i<parts.length-1;i++){cur[parts[i]]=cur[parts[i]]||{};cur=cur[parts[i]];}
  cur[parts[parts.length-1]]=val;localStorage.setItem('pm26',JSON.stringify(obj));return Promise.resolve();
}
function dbDel(path){
  if(fbOk)return db.ref(path).remove();
  const parts=path.split('/');let obj=JSON.parse(localStorage.getItem('pm26')||'{}'),cur=obj;
  for(let i=0;i<parts.length-1;i++){if(!cur[parts[i]])return;cur=cur[parts[i]];}
  delete cur[parts[parts.length-1]];localStorage.setItem('pm26',JSON.stringify(obj));return Promise.resolve();
}
function loadLocal(){

/** Calcula la tabla de posiciones de un grupo a partir de un set de predicciones */
function calcGrupoTable(groupId, preds){
  const g=GRUPOS.find(x=>x.id===groupId);
  const ms=PARTIDOS.filter(m=>m.grupo===groupId);
  const st={};
  for(const t of g.equipos)st[t]={name:t,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0,P:0};

  for(const m of ms){
    const p=preds[m.id];
    if(!p||p.home==null||p.away==null||p.home===''||p.away==='')continue;
    const gh=+p.home,ga=+p.away;
    if(isNaN(gh)||isNaN(ga))continue;
    st[m.home].P++;st[m.away].P++;
    st[m.home].GF+=gh;st[m.home].GA+=ga;
    st[m.away].GF+=ga;st[m.away].GA+=gh;
    if(gh>ga){st[m.home].W++;st[m.home].Pts+=3;st[m.away].L++;}
    else if(gh<ga){st[m.away].W++;st[m.away].Pts+=3;st[m.home].L++;}
    else{st[m.home].D++;st[m.home].Pts++;st[m.away].D++;st[m.away].Pts++;}
  }
  for(const t of Object.values(st))t.GD=t.GF-t.GA;
  return sortearGrupo(Object.values(st),ms,preds);
}

/** Ordenamiento con criterios de desempate oficiales FIFA 2026:
 *  1) Puntos → 2) MANO A MANO entre los empatados (pts → dif. gol → goles)
 *  → 3) Dif. de gol general → 4) Goles a favor general → 5) conducta/ranking FIFA (no disponibles).
 *  Maneja empates de 2, 3 o 4 equipos con una mini-tabla recursiva (estilo FIFA/UEFA). */
function overallCmpEq(a,b){
  if(b.GD!==a.GD)return b.GD-a.GD;
  if(b.GF!==a.GF)return b.GF-a.GF;
  return a.name.localeCompare(b.name);
}
function resolveTieGroup(block,ms,preds){
  if(block.length<2)return block;
  const names=new Set(block.map(t=>t.name));
  const mini={};block.forEach(t=>mini[t.name]={Pts:0,GF:0,GA:0,GD:0});
  let complete=true;
  for(const m of ms){
    if(names.has(m.home)&&names.has(m.away)){
      const p=preds[m.id];
      if(!p||p.home==null||p.away==null||p.home===''||p.away===''){complete=false;continue;}
      const gh=+p.home,ga=+p.away;
      mini[m.home].GF+=gh;mini[m.home].GA+=ga;
      mini[m.away].GF+=ga;mini[m.away].GA+=gh;
      if(gh>ga)mini[m.home].Pts+=3;else if(gh<ga)mini[m.away].Pts+=3;else{mini[m.home].Pts++;mini[m.away].Pts++;}
    }
  }
  Object.values(mini).forEach(x=>x.GD=x.GF-x.GA);
  if(!complete)return[...block].sort(overallCmpEq); // mano a mano aún incompleto → criterio general
  const sorted=[...block].sort((a,b)=>{
    if(mini[b.name].Pts!==mini[a.name].Pts)return mini[b.name].Pts-mini[a.name].Pts;
    if(mini[b.name].GD!==mini[a.name].GD)return mini[b.name].GD-mini[a.name].GD;
    if(mini[b.name].GF!==mini[a.name].GF)return mini[b.name].GF-mini[a.name].GF;
    return 0;
  });
  const out=[];let i=0;
  while(i<sorted.length){
    let j=i;
    while(j<sorted.length&&mini[sorted[j].name].Pts===mini[sorted[i].name].Pts&&mini[sorted[j].name].GD===mini[sorted[i].name].GD&&mini[sorted[j].name].GF===mini[sorted[i].name].GF)j++;
    const sub=sorted.slice(i,j);
    if(sub.length>1&&sub.length<block.length)out.push(...resolveTieGroup(sub,ms,preds)); // re-aplicar mano a mano al subgrupo
    else if(sub.length>1)out.push(...[...sub].sort(overallCmpEq)); // siguen iguales → general
    else out.push(sub[0]);
    i=j;
  }
  return out;
}
function sortearGrupo(teams,ms,preds){
  const arr=[...teams].sort((a,b)=>b.Pts-a.Pts);
  const result=[];let i=0;
  while(i<arr.length){
    let j=i;while(j<arr.length&&arr[j].Pts===arr[i].Pts)j++;
    const block=arr.slice(i,j);
    result.push(...(block.length>1?resolveTieGroup(block,ms,preds):block));
    i=j;
  }
  return result;
}

function h2h(tA,tB,ms,preds){
  const r={[tA]:{Pts:0,GF:0,GA:0,GD:0},[tB]:{Pts:0,GF:0,GA:0,GD:0}};
  for(const m of ms){
    if(!((m.home===tA&&m.away===tB)||(m.home===tB&&m.away===tA)))continue;
    const p=preds[m.id];if(!p||p.home==null||p.away==null)return null;
    const gh=+p.home,ga=+p.away;
    r[m.home].GF+=gh;r[m.home].GA+=ga;r[m.home].GD=r[m.home].GF-r[m.home].GA;
    r[m.away].GF+=ga;r[m.away].GA+=gh;r[m.away].GD=r[m.away].GF-r[m.away].GA;
    if(gh>ga)r[m.home].Pts+=3;else if(gh<ga)r[m.away].Pts+=3;else{r[m.home].Pts++;r[m.away].Pts++;}
  }
  return r;
}

/** Calcula todas las tablas */
function allTables(preds){
  return GRUPOS.map(g=>({id:g.id,nombre:g.nombre,tabla:calcGrupoTable(g.id,preds)}));
}

/**
 * Selección de los 8 mejores terceros (art. FIFA 2026)
 * Desempate: Pts → Dif Gol → GF → Victorias
 */
function mejoresTerceros(tables){
  const thirds=tables.map(t=>{
    const eq=t.tabla[2];
    return eq?{...eq,groupId:t.id,groupName:t.nombre}:null;
  }).filter(Boolean);
  thirds.sort((a,b)=>{
    if(b.Pts!==a.Pts)return b.Pts-a.Pts;   // 1) Puntos
    if(b.GD!==a.GD)return b.GD-a.GD;        // 2) Diferencia de gol (todos los partidos)
    if(b.GF!==a.GF)return b.GF-a.GF;        // 3) Goles a favor (todos los partidos)
    // 4) Conducta (tarjetas) y 5) Ranking FIFA: no se computan en el pool → el admin desempata a mano si hace falta
    return a.name.localeCompare(b.name);
  });
  return thirds;
}

/** Resuelve un slot '1A', '2B', '3-1' al nombre del equipo */
function resolveSlot(slot,tables,thirds){
  if(slot.startsWith('3-')){
    const i=parseInt(slot.split('-')[1])-1;
    return thirds[i]?thirds[i].name:'?';
  }
  const pos=parseInt(slot[0])-1;
  const gid=slot[1];
  const tbl=tables.find(t=>t.id===gid);
  return(tbl&&tbl.tabla[pos])?tbl.tabla[pos].name:'?';
}

/* Asigna los 8 grupos de los mejores terceros a sus slots respetando los grupos
   habilitados por FIFA (matching con heurística MRV). Devuelve {r32:grupo} o null. */
function asignarTercerosASlots(qualGroups){
  // 1) Tabla oficial FIFA (Anexo C): la combinacion de grupos define el cruce exacto.
  const key=[...qualGroups].sort().join('');
  const row=F2_THIRD_TABLE[key];
  if(row&&row.length===8){
    const assign={};
    for(let i=0;i<8;i++)assign[F2_WIN2SLOT[F2_WIN_ORDER[i]]]=row[i];
    return assign;
  }
  // 2) Respaldo (no deberia usarse: la tabla cubre las 495 combinaciones).
  return asignarTercerosASlotsHeuristica(qualGroups);
}
function asignarTercerosASlotsHeuristica(qualGroups){
  const rank={};qualGroups.forEach((g,i)=>rank[g]=i);
  const assign={},used={};
  const avail=r32=>{const s=F2_THIRD_SLOTS.find(x=>x.r32===r32);
    return s.elig.filter(g=>rank[g]!=null&&!used[g]).sort((a,b)=>rank[a]-rank[b]);};
  function solve(slots){
    if(!slots.length)return true;
    let best=slots[0],bo=avail(best);
    for(const r of slots){const o=avail(r);if(o.length<bo.length){best=r;bo=o;}}
    if(!bo.length)return false;
    const rest=slots.filter(r=>r!==best);
    for(const g of bo){used[g]=1;assign[best]=g;if(solve(rest))return true;delete used[g];delete assign[best];}
    return false;
  }
  return solve(F2_THIRD_SLOTS.map(s=>s.r32))?assign:null;
}

/* Resuelve los 16 cruces de 16avos para unas tablas/terceros dados (formato oficial FIFA 2026).
   Ganadores y segundos: exactos. Terceros: 8 mejores asignados a su slot habilitado.
   Lo usan tanto el autocompletado de Fase 2 como la vista "Clasificados" (misma asignación). */
function construirR32(tables,thirds){
  const qualGroups=thirds.slice(0,8).map(t=>t.groupId);
  const thirdAssign=asignarTercerosASlots(qualGroups);
  const nameOf=(gid,pos)=>{const t=tables.find(x=>x.id===gid);return(t&&t.tabla[pos])?t.tabla[pos].name:'';};
  const resolve=(slot,r32id)=>{
    if(slot[0]==='3'){const gid=thirdAssign?thirdAssign[r32id]:null;return gid?nameOf(gid,2):'';}
    return nameOf(slot[1],+slot[0]-1);
  };
  const cruces=R32.map(m=>({...m,homeTeam:resolve(m.home,m.id),awayTeam:resolve(m.away,m.id)}));
  return{cruces,thirdAssign,qualGroups};
}
function calcularR32Auto(){
  const tables=allTables(allResults);
  const thirds=mejoresTerceros(tables);
  const{cruces,thirdAssign,qualGroups}=construirR32(tables,thirds);
  const bracket={};
  cruces.forEach((m,i)=>{bracket['r1m'+(i+1)]={home:m.homeTeam,away:m.awayTeam};});
  return{bracket,thirds,qualGroups,thirdAssign,tables};
}

/* Cuadro de 16avos EFECTIVO. Si el admin cargó un override manual (f2bracketStored), se usa eso;
   si no, se DERIVA solo cuando los 72 partidos de grupo están cargados → se carga automáticamente. */
function todosGruposCompletos(){
  return PARTIDOS.every(m=>{const r=allResults[m.id];return r&&r.home!=null&&r.home!==''&&r.away!=null&&r.away!=='';});
}
function recomputeF2Bracket(){
  if(f2bracketStored&&Object.keys(f2bracketStored).length){f2bracket=f2bracketStored;return;}
  f2bracket=todosGruposCompletos()?calcularR32Auto().bracket:{};
}

/* Dibuja la llave (draw) completa: 16avos cargados + rondas siguientes "Por definir".
   crosses = array de 16 {homeTeam,awayTeam} en orden de bracket. Reusa el visual del cuadro. */
function drawCell(name){
  if(!name)return `<button class="cz-team empty" disabled>Por definir</button>`;
  const safe=String(name).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<button class="cz-team" disabled style="cursor:default" title="${safe}">${safe}</button>`;
}
function buildDrawHTML(crosses){
  let html='<div class="cz-wrap"><div class="cz">';
  ['r1','r2','r3','r4','r5'].forEach((round,ri)=>{
    const slotH=F2_BASE*Math.pow(2,ri),count=BRACKET_COUNTS[round];
    let col=`<div class="cz-col"><div class="cz-h">${F2_SHORT[round]}</div>`;
    for(let i=1;i<=count;i++){
      let tA=null,tB=null;
      if(ri===0){const c=crosses[i-1]||{};tA=c.homeTeam||null;tB=c.awayTeam||null;}
      col+=`<div class="cz-slot" style="height:${slotH}px">`;
      if(ri>0)col+=`<div class="cz-conn" style="height:${slotH/2}px"></div>`;
      col+=`<div class="cz-cell">${drawCell(tA)}${drawCell(tB)}</div></div>`;
    }
    html+=col+'</div>';
  });
  html+=`<div class="cz-col"><div class="cz-h">🏆 Campeón</div><div class="cz-slot" style="height:${F2_BASE*16}px"><div class="cz-conn1"></div><div class="cz-champ">—</div></div></div>`;
  return html+'</div></div>';
}

function renderGrupoPanel(groupId, preds, thirds){
  const tbl=calcGrupoTable(groupId,preds);
  const thirdNames=(thirds||[]).slice(0,8).map(t=>t.name);
  const rows=tbl.map((t,i)=>{
    const cl=i===0?'gt-q1':i===1?'gt-q2':thirdNames.includes(t.name)?'gt-q3':'gt-q4';
    const ico=i===0?'🟢':i===1?'🔵':thirdNames.includes(t.name)?'🟡':'⬜';
    const gd=(t.GD>=0?'+':'')+t.GD;
    return`<tr class="${cl}"><td>${ico}</td><td style="max-width:95px;overflow:hidden;text-overflow:ellipsis">${t.name}</td>
           <td class="tc bold">${t.Pts}</td><td class="tc muted">${gd}</td><td class="tc muted">${t.GF}</td></tr>`;
  }).join('');
  const played=tbl.reduce((s,t)=>s+t.P,0)/2;
  return`<div class="gt-panel">
    <div class="gt-title">Tabla</div>
    <table><thead><tr><th></th><th>Equipo</th><th>Pts</th><th>Dif</th><th>GF</th></tr></thead>
    <tbody>${rows}</tbody></table>
    <div class="gt-legend">🟢 1°&nbsp; 🔵 2°&nbsp; 🟡 3° posible&nbsp; ⬜ Eliminado</div>
    <div class="gt-legend" style="margin-top:2px">${played}/6 partidos completados</div>
  </div>`;
}

/** Actualiza el panel de tabla en vivo (llamado en oninput) */
function liveGrupo(groupId){
  const el=document.getElementById('gt_'+groupId);
  if(!el)return;
  const ms=PARTIDOS.filter(m=>m.grupo===groupId);
  const preds={...(allPreds[currentUser.id]||{})};
  for(const m of ms){
    const hEl=document.getElementById('ph_'+m.id),aEl=document.getElementById('pa_'+m.id);
    if(hEl&&aEl){
      if(hEl.value!==''&&aEl.value!=='')preds[m.id]={home:+hEl.value,away:+aEl.value};
      else delete preds[m.id];
    }
  }
  // Calcular terceros con todos los grupos (usando DOM para el grupo actual)
  const allP={...(allPreds[currentUser.id]||{}),...preds};
  const tables=allTables(allP);
  const thirds=mejoresTerceros(tables);
  el.innerHTML=renderGrupoPanel(groupId,allP,thirds);
}

async function doLogin(){
  const u=(document.getElementById('lU').value||'').trim().toLowerCase();
  const p=document.getElementById('lP').value||'';
  const e=document.getElementById('loginErr');
  if(!u||!p){e.textContent='Completá usuario y contraseña';e.classList.remove('hidden');return;}
  const hash=await hashPwd(p);
  let found=null;
  for(const[id,usr]of Object.entries(allUsers))
    if((usr.username||'').toLowerCase()===u&&usr.passwordHash===hash){found={id,...usr};break;}
  if(!found){e.textContent='Usuario o contraseña incorrectos';e.classList.remove('hidden');return;}
  currentUser=found;sessionStorage.setItem('pm26_user',JSON.stringify(currentUser));
  currentView=found.isAdmin?'admin':'pred';renderApp();
}
function doLogout(){currentUser=null;sessionStorage.removeItem('pm26_user');renderLogin();}

function renderApp(){

                   :`<span class="chip chip-grn"><span class="chip-dot"></span>Pronósticos abiertos</span>`;
  const hasF2=Object.keys(f2bracket).length>0;
  const tabs=[
    ['pred','📝 Pronósticos F1'],
    ['bracket','🏅 Clasificados F1'],
    ...(locked||isAdmin?[['all','👁️ Ver todos F1']]:[]),
    ...(isAdmin||(f2cfg.open&&f2qualifiers.includes(currentUser.id)&&hasF2)?[['f2','📝 Pronósticos F2']]:[]),
    ...(hasF2&&(f2cfg.locked||isAdmin)?[['f2plan','👁️ Ver todos F2']]:[]),

    ['ranking','🏆 Ranking'],
    ['chat','💬 Chat'],

  const nav=tabs.map(([v,l])=>`<button class="nav-btn ${currentView===v?'active':''}" onclick="sw('${v}')">${l}</button>`).join('');

function chatMsgsHtml(){
  const isAdmin=currentUser.isAdmin;
  const esc=t=>String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const allNames=Object.values(allUsers).map(u=>u&&u.displayName).filter(Boolean)
    .sort((a,b)=>b.length-a.length);
  const fmt=t=>{
    let h=esc(t);
    if(allNames.length){
      const pat=new RegExp('@('+allNames.map(n=>esc(n).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')','g');
      h=h.replace(pat,'<span class="mention">@$1</span>');
    }
    return h.replace(/\n/g,'<br>');
  };
  const msgs=Object.entries(allChat)
    .map(([id,m])=>({id,...m}))
    .filter(m=>m&&m.text)
    // Un mensaje privado solo lo ven: el organizador, quien lo envió y su destinatario
    .filter(m=>!m.priv||isAdmin||m.uid===currentUser.id||m.to===currentUser.id)
    .sort((a,b)=>(a.ts||0)-(b.ts||0));
  if(!msgs.length)return '<p class="tc muted" style="padding:40px 14px">Todavía no hay mensajes. ¡Sé el primero en escribir! 👋</p>';
  return msgs.map(m=>{
    const mine=m.uid===currentUser.id;
    const d=new Date(m.ts||0);
    const hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0');
    const dd=String(d.getDate()).padStart(2,'0'),mo=String(d.getMonth()+1).padStart(2,'0');
    const when=`${dd}/${mo} ${hh}:${mm}`;
    const txt=fmt(m.text);
    const name=String(m.name||'?').replace(/</g,'&lt;');
    // Etiqueta del mensaje privado según quién lo mira
    let badge='';
    if(m.priv){
      let lbl;
      if(mine) lbl=isAdmin?`Privado a ${String((allUsers[m.to]||{}).displayName||'?').replace(/</g,'&lt;')}`:'Privado al organizador';
      else if(isAdmin) lbl='Privado para el organizador';
      else lbl='Privado del organizador';
      badge=`<span class="chat-priv-badge">🔒 ${lbl}</span>`;
    }
    const del=isAdmin?`<button class="chat-del" title="Borrar mensaje" onclick="delChat('${m.id}')">✕</button>`:'';
    // Cualquiera puede responder citando; el organizador además puede responder en privado
    const quoteBtn=m.priv?'':`<button class="chat-reply" title="Responder" onclick="replyMsg('${m.id}')">↩︎</button>`;
    const replyPrivBtn=(isAdmin&&!mine)?`<button class="chat-reply" title="Responder en privado" onclick="replyPriv('${m.uid}')">🔒</button>`:'';

function renderChatMessages(){

let chatPrivTo=null;   // organizador respondiendo en privado a este uid
let chatReplyTo=null;  // id del mensaje que se está citando
const CHAT_EMOJIS=['😀','😂','🤣','😅','😊','😉','😜','😎','🤔','😬','😢','😭','😡','🥳','🤩','😱','🤦','🤷','😴','🫣','👍','👎','👏','🙌','💪','🙏','🤝','✌️','🩵','💔','🔥','💀','⚽','🥅','🧤','🏆','🥇','🎉','🍻','🇦🇷'];
function chatControlsHtml(){

}
function chatKeydown(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();return;}
  if(e.key==='Escape'){hideMention();hideEmoji();}
}
function chatInputChanged(){
  const inp=document.getElementById('chatInput'),dd=document.getElementById('mentionDD');
  if(!inp||!dd)return;
  const pos=inp.selectionStart,txt=inp.value.slice(0,pos);
  const m=txt.match(/@([^\s@]{0,20})$/);
  if(!m){dd.style.display='none';return;}
  const q=m[1].toLowerCase();
  const opts=Object.values(allUsers).map(u=>u&&u.displayName).filter(Boolean)
    .filter(n=>n.toLowerCase().startsWith(q))
    .sort((a,b)=>a.localeCompare(b)).slice(0,8);
  if(!opts.length){dd.style.display='none';return;}
  dd.innerHTML=opts.map(n=>{
    const safe=n.replace(/\\/g,'').replace(/'/g,"\\'").replace(/</g,'&lt;');
    return `<div onclick="pickMention('${safe}')">👤 ${n.replace(/</g,'&lt;')}</div>`;
  }).join('');
  dd.style.display='block';
}
function pickMention(name){
  const inp=document.getElementById('chatInput');
  if(!inp)return;
  const pos=inp.selectionStart,txt=inp.value.slice(0,pos);
  const start=txt.lastIndexOf('@');
  inp.value=inp.value.slice(0,start)+'@'+name+' '+inp.value.slice(pos);
  hideMention();inp.focus();
  const np=start+name.length+2;inp.setSelectionRange(np,np);
}
function hideMention(){const dd=document.getElementById('mentionDD');if(dd)dd.style.display='none';}
function toggleEmoji(){const p=document.getElementById('emojiPanel');if(p)p.style.display=(p.style.display==='none'?'grid':'none');}
function hideEmoji(){const p=document.getElementById('emojiPanel');if(p)p.style.display='none';}
function insEmoji(e){
  const inp=document.getElementById('chatInput');
  if(!inp)return;
  const pos=inp.selectionStart;
  inp.value=inp.value.slice(0,pos)+e+inp.value.slice(inp.selectionEnd);
  inp.focus();const np=pos+e.length;inp.setSelectionRange(np,np);
}
function replyMsg(id){chatReplyTo=id;renderChatControls();}
function cancelReply(){chatReplyTo=null;renderChatControls();}
function scrollToMsg(id){
  const el=document.getElementById('msg_'+id);
  if(!el)return;
  el.scrollIntoView({behavior:'smooth',block:'center'});
  el.style.transition='background .4s';el.style.background='rgba(200,168,75,.3)';el.style.borderRadius='10px';
  setTimeout(()=>{el.style.background='';},1400);
}
function viewChat(){
  return `
    <div class="card" style="display:flex;flex-direction:column;height:calc(100vh - 230px);min-height:380px;padding:0;overflow:hidden">
      <div class="card-title" style="padding:16px 20px 12px;margin:0;border-bottom:1px solid var(--lgray)">💬 Chat general · PRODEMU 2026</div>
      <div id="chatMsgs" style="flex:1;overflow-y:auto;padding:14px 16px;background:#f6f8fb">${chatMsgsHtml()}</div>
      <div id="chatControls">${chatControlsHtml()}</div>
    </div>`;
}
function renderChatControls(){
  const c=document.getElementById('chatControls');
  if(c){c.innerHTML=chatControlsHtml();const i=document.getElementById('chatInput');if(i)i.focus();}
}
function replyPriv(uid){chatPrivTo=uid;chatReplyTo=null;renderChatControls();}
function cancelPriv(){chatPrivTo=null;renderChatControls();}
function sendChat(){
  const inp=document.getElementById('chatInput');
  if(!inp)return;
  const text=inp.value.trim();
  if(!text)return;
  hideMention();hideEmoji();
  const id='m_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  const msg={uid:currentUser.id,name:currentUser.displayName,text,ts:Date.now()};
  // Cita del mensaje respondido
  if(chatReplyTo&&allChat[chatReplyTo]){
    const rm=allChat[chatReplyTo];
    msg.reply={id:chatReplyTo,name:rm.name||'?',text:String(rm.text||'').slice(0,140)};
  }
  // Marcar como privado: organizador respondiendo, o participante con el tilde activo
  if(currentUser.isAdmin){
    if(chatPrivTo){msg.priv=true;msg.to=chatPrivTo;}
  }else{
    const chk=document.getElementById('chatPriv');
    if(chk&&chk.checked)msg.priv=true; // dirigido al organizador
  }
  inp.value='';
  const wasReply=currentUser.isAdmin&&chatPrivTo,hadQuote=!!chatReplyTo;
  dbSet('chat/'+id,msg).then(()=>{
    if(!fbOk){allChat[id]=msg;renderChatMessages();}
    if(wasReply)chatPrivTo=null;
    if(hadQuote)chatReplyTo=null;
    if(wasReply||hadQuote)renderChatControls();
    setTimeout(scrollChatBottom,40);
  });
  inp.focus();
}
function delChat(id){
  if(!currentUser.isAdmin)return;
  if(!confirm('¿Borrar este mensaje?'))return;
  dbDel('chat/'+id).then(()=>{
    if(!fbOk){delete allChat[id];renderChatMessages();}
  });
}

async function savePreds(){
  const uid=currentUser.id,saved={...(allPreds[uid]||{})};
  for(const m of PARTIDOS){
    const hEl=document.getElementById('ph_'+m.id),aEl=document.getElementById('pa_'+m.id);

  }
  await dbSet(`preds/${uid}`,saved);
  allPreds[uid]=saved;
  const ts=Date.now();
  allUsers[uid].predSubmittedAt=ts;
  await dbSet(`users/${uid}/predSubmittedAt`,ts);
  toast(`✅ Pronósticos guardados (${countDone(uid)}/${PARTIDOS.length})`,'ok');
  renderApp();
}

function viewAll(){
  const players=Object.entries(allUsers).filter(([,u])=>!u.isAdmin);
  if(players.length===0)return`<div class="card"><p class="tc muted" style="padding:24px">Sin participantes.</p></div>`;
  // Mismo orden que la hoja de Admin (orden en que se fueron cargando los jugadores)
  const order=players.map(([uid,u])=>({uid,name:u.displayName||u.username||uid,sc:userScore(uid)}));
  const nPlayed=PARTIDOS.filter(m=>allResults[m.id]).length;
  const cols=order.length+2;
  const colg=`<colgroup><col style="width:184px"><col style="width:54px">${order.map(()=>'<col style="width:96px">').join('')}</colgroup>`;

  const head=`<tr><th style="text-align:left">Partido</th><th>Result.</th>${order.map(p=>`<th title="${p.name}">${p.name}</th>`).join('')}</tr>`;
  const totals=`<tr class="pm-total"><td style="text-align:left">TOTAL · ${nPlayed}/72 jugados</td><td class="tc">pts</td>${order.map(p=>`<td class="tc">${p.sc.t}</td>`).join('')}</tr>`;

  let body=totals; // total arriba, siempre visible
  for(const g of GRUPOS){
    const ms=PARTIDOS.filter(m=>m.grupo===g.id);
    body+=`<tr class="pm-grp-header"><td colspan="${cols}">${g.nombre}</td></tr>`;
    body+=ms.map(m=>{
      const res=allResults[m.id];
      const resHtml=res?`<b>${res.home}–${res.away}</b>`:'<span class="muted">–</span>';
      return`<tr>
        <td>${m.home} vs ${m.away}</td>
        <td class="tc">${resHtml}</td>
        ${order.map(p=>{
          const pr=(allPreds[p.uid]||{})[m.id];
          if(!pr||pr.home==null)return`<td class="tc muted">–</td>`;
          const pts=calcPts(pr,res);
          let bg='';
          if(pts!==null)bg=pts.t===4?'background:#dcfce7':pts.t===3?'background:#dbeafe':pts.t===1?'background:#fef9c3':'background:#fef2f2';
          return`<td class="tc" style="${bg}">${pr.home}–${pr.away}${pts!==null?` <span class="xs muted">${pts.t>0?'+'+pts.t:'0'}</span>`:''}</td>`;
        }).join('')}
      </tr>`;
    }).join('');
  }

  return`
    <div class="card">
      <div class="card-title">👁️ Ver todos F1 — pronósticos de los participantes</div>
      <p class="sm muted">Todos los partidos, el resultado oficial, el pronóstico de cada jugador y los puntos que saca. Colores: <b style="background:#dcfce7;padding:0 4px;border-radius:3px">4</b> exacto · <b style="background:#dbeafe;padding:0 4px;border-radius:3px">3</b> resultado · <b style="background:#fef9c3;padding:0 4px;border-radius:3px">1</b> · <b style="background:#fef2f2;padding:0 4px;border-radius:3px">0</b>.</p>
    </div>
    <div class="card" style="padding:10px">
      <div style="overflow:auto;max-height:78vh">
        <table class="pm pm-sheet">${colg}
          <thead>${head}</thead>
          <tbody>${body}</tbody>
        </table>
      </div>
    </div>`;
}


// =============================================================================
//  FASE 2 – LÓGICA Y VISTAS

function f2initPicks(){
  if(!f2picksLoaded&&currentUser){
    f2picks={...(f2preds[currentUser.id]||{})};
    f2picksLoaded=true;
  }
}
function f2getTeams(mid,picks){
  if(mid.startsWith('r1')){const b=f2bracket[mid]||{};return[b.home||'?',b.away||'?'];}
  const[a,b]=BRACKET_FEED[mid];
  return[picks[a]||(a.toUpperCase()),picks[b]||(b.toUpperCase())];
}
function f2calcScore(uid){
  const p=f2preds[uid]||{};let t=0;
  for(const[r,n] of Object.entries(BRACKET_COUNTS))
    for(let i=1;i<=n;i++){const m=r+'m'+i;if(f2results[m]&&p[m]===f2results[m])t+=BRACKET_PTS[r];}
  return t;
}
function pickF2(mid,team){
  f2picks[mid]=team;
  (function clear(id){for(const[m,feeds] of Object.entries(BRACKET_FEED))if(feeds.includes(id)){delete f2picks[m];clear(m);}})(mid);
  const el=document.getElementById('f2wrap');if(el)el.innerHTML=f2buildHTML();
  f2updateStats();
}
function f2updateStats(){
  const total=Object.values(BRACKET_COUNTS).reduce((s,n)=>s+n,0);
  const done=Object.keys(f2picks).length;
  const dEl=document.getElementById('f2-done');if(dEl)dEl.textContent=done+'/'+total;
  const pEl=document.getElementById('f2-pct');if(pEl)pEl.textContent=Math.round(done/total*100)+'%';
  const wEl=document.getElementById('f2-warn');if(wEl)wEl.style.display=(done<total&&!f2cfg.locked)?'':'none';
  const oEl=document.getElementById('f2-ok');if(oEl)oEl.style.display=(done===total)?'':'none';
  const cEl=document.getElementById('f2-champ');if(cEl){const c=f2picks['r5m1'];cEl.textContent=c?('🏆 Tu campeón: '+c):'';}
}
async function saveF2Pred(){
  const totalPicks=Object.values(BRACKET_COUNTS).reduce((s,n)=>s+n,0);
  const done=Object.keys(f2picks).length;
  if(done<totalPicks){
    toast(`❌ Faltan ${totalPicks-done} picks. El reglamento exige completar todo el bracket (hasta la Final) antes del primer partido de Fase 2.`,'err');
    return;
  }
  const uid=currentUser.id;
  const data={...f2picks};
  await dbSet('f2/preds/'+uid,data);
  f2preds[uid]=data;
  toast('✅ Bracket completo guardado','ok');
}
// Devuelve [equipoA,equipoB] de un cruce: r1 desde el bracket del admin, el resto desde los picks que van pasando
function f2teamsFor(mid){
  if(mid.startsWith('r1')){const b=f2bracket[mid]||{};return[b.home||null,b.away||null];}
  const[a,b]=BRACKET_FEED[mid];
  return[f2picks[a]||null,f2picks[b]||null];
}
function f2teamBtn(mid,name,pick,real,locked){
  if(!name)return `<button class="cz-team empty" disabled>Por definir</button>`;
  let cls='cz-team';
  if(pick===name)cls+= real?(real===name?' win':' loss'):' sel';
  else if(real===name)cls+=' real';
  const esc=t=>t.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const safe=name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<button class="${cls}" ${locked?'disabled':''} onclick="pickF2('${mid}','${esc(name)}')" title="${safe}">${safe}</button>`;
}
// Cuadro visual: columnas conectadas (16avos → Final → Campeón) que se va armando al elegir
function f2buildHTML(){
  const locked=f2cfg.locked;
  let html='<div class="cz-wrap"><div class="cz">';
  ['r1','r2','r3','r4','r5'].forEach((round,ri)=>{
    const slotH=F2_BASE*Math.pow(2,ri),count=BRACKET_COUNTS[round];
    const done=Array.from({length:count},(_,i)=>f2picks[round+'m'+(i+1)]).filter(Boolean).length;
    let col=`<div class="cz-col"><div class="cz-h">${F2_SHORT[round]}<span class="cz-pts">${BRACKET_PTS[round]}p</span><span class="cz-cnt">${done}/${count}</span></div>`;
    for(let i=1;i<=count;i++){
      const mid=round+'m'+i,[tA,tB]=f2teamsFor(mid);
      const pick=f2picks[mid],real=f2results[mid];
      col+=`<div class="cz-slot" style="height:${slotH}px">`;
      if(ri>0)col+=`<div class="cz-conn" style="height:${slotH/2}px"></div>`;
      col+=`<div class="cz-cell">${f2teamBtn(mid,tA,pick,real,locked)}${f2teamBtn(mid,tB,pick,real,locked)}</div></div>`;
    }
    html+=col+'</div>';
  });
  const champ=f2picks['r5m1'],realChamp=f2results['r5m1'];
  const champCls=champ?(realChamp?(realChamp===champ?'ok':'bad'):'on'):'';
  const champTxt=champ?champ.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'¿?';
  html+=`<div class="cz-col"><div class="cz-h">🏆 Campeón</div><div class="cz-slot" style="height:${F2_BASE*16}px"><div class="cz-conn1"></div><div class="cz-champ ${champCls}">${champTxt}</div></div></div>`;
  return html+'</div></div>';
}

    </div>

    <div class="stats-row">

// Cuadro de un participante en SOLO LECTURA (para "Brackets F2")
function f2buildReadonly(picks){
  picks=picks||{};
  let html='<div class="cz-wrap"><div class="cz">';
  ['r1','r2','r3','r4','r5'].forEach((round,ri)=>{
    const slotH=F2_BASE*Math.pow(2,ri),count=BRACKET_COUNTS[round];
    let col=`<div class="cz-col"><div class="cz-h">${F2_SHORT[round]}<span class="cz-pts">${BRACKET_PTS[round]}p</span></div>`;
    for(let i=1;i<=count;i++){
      const mid=round+'m'+i;let tA,tB;
      if(mid.startsWith('r1')){const b=f2bracket[mid]||{};tA=b.home||null;tB=b.away||null;}
      else{const[a,b]=BRACKET_FEED[mid];tA=picks[a]||null;tB=picks[b]||null;}
      const pick=picks[mid],real=f2results[mid];
      col+=`<div class="cz-slot" style="height:${slotH}px">`;
      if(ri>0)col+=`<div class="cz-conn" style="height:${slotH/2}px"></div>`;
      col+=`<div class="cz-cell">${f2teamBtn(mid,tA,pick,real,true)}${f2teamBtn(mid,tB,pick,real,true)}</div></div>`;
    }
    html+=col+'</div>';
  });
  const champ=picks['r5m1'],realChamp=f2results['r5m1'];
  const champCls=champ?(realChamp?(realChamp===champ?'ok':'bad'):'on'):'';
  const champTxt=champ?champ.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'—';
  html+=`<div class="cz-col"><div class="cz-h">🏆 Campeón</div><div class="cz-slot" style="height:${F2_BASE*16}px"><div class="cz-conn1"></div><div class="cz-champ ${champCls}">${champTxt}</div></div></div>`;
  return html+'</div></div>';
}
// Vista: TODOS ven los brackets de Fase 2 de los clasificados (se habilita al cerrar los picks)

    return`<div class="card"><div class="alert alert-warn tc" style="padding:24px">Todavía nadie cargó su bracket de Fase 2.</div></div>`;

    .sort((a,b)=>b.pts-a.pts||a.name.localeCompare(b.name));
  if(!f2allSel||!ids.includes(f2allSel))f2allSel=list[0].uid;

// Planilla de transparencia de Fase 2: todos los partidos del cuadro × jugadores (pick + ganador real + puntos + totales)
function viewF2Planilla(){
  if(!Object.keys(f2bracket).length)
    return`<div class="card"><div class="alert alert-info tc" style="padding:24px">La Fase 2 todavía no está configurada.</div></div>`;
  if(!f2cfg.locked&&!currentUser.isAdmin)
    return`<div class="card"><div class="alert alert-info tc" style="padding:24px">🔒 La planilla se habilita cuando el organizador cierre los picks de la Fase 2.</div></div>`;
  const base=(f2qualifiers&&f2qualifiers.length)?f2qualifiers:Object.keys(allUsers).filter(u=>!(allUsers[u]||{}).isAdmin);
  const ids=base.filter(uid=>f2preds[uid]&&Object.keys(f2preds[uid]).length);
  if(!ids.length)
    return`<div class="card"><div class="alert alert-warn tc" style="padding:24px">Todavía nadie cargó su bracket de Fase 2.</div></div>`;
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const order=ids.map(uid=>{const u=allUsers[uid]||{};return{uid,name:u.displayName||u.username||uid,pts:f2calcScore(uid)};})
    .sort((a,b)=>b.pts-a.pts||a.name.localeCompare(b.name));
  const cols=order.length+2;
  const realTeams=mid=>{
    if(mid.startsWith('r1')){const b=f2bracket[mid]||{};return[b.home||'?',b.away||'?'];}
    const[a,b]=BRACKET_FEED[mid];return[f2results[a]||'?',f2results[b]||'?'];
  };
  const head=`<tr><th style="text-align:left">Partido</th><th>Pasa</th>${order.map(p=>`<th title="${esc(p.name)}">${esc(p.name.split(' ')[0])}</th>`).join('')}</tr>`;
  const totals=`<tr class="pm-total"><td style="text-align:left">TOTAL</td><td class="tc">pts</td>${order.map(p=>`<td class="tc">${p.pts}</td>`).join('')}</tr>`;
  let body=totals;
  ['r1','r2','r3','r4','r5'].forEach(round=>{
    const count=BRACKET_COUNTS[round],pts=BRACKET_PTS[round];
    body+=`<tr class="pm-grp-header"><td colspan="${cols}">${F2_SHORT[round]} · ${pts} pts c/u</td></tr>`;
    for(let i=1;i<=count;i++){
      const mid=round+'m'+i,tt=realTeams(mid),real=f2results[mid];
      const label=(tt[0]==='?'&&tt[1]==='?')?`<span class="muted">Partido ${i}</span>`:`${esc(tt[0])}&nbsp;vs&nbsp;${esc(tt[1])}`;
      const realHtml=real?`<b>${esc(real)}</b>`:'<span class="muted">–</span>';
      body+=`<tr><td style="white-space:nowrap">${label}</td><td class="tc">${realHtml}</td>${order.map(p=>{
        const pick=(f2preds[p.uid]||{})[mid];
        if(!pick)return`<td class="tc muted">–</td>`;
        let bg='';if(real)bg=pick===real?'background:#dcfce7':'background:#fef2f2';
        const got=real&&pick===real?`<br><span class="xs muted">+${pts}</span>`:'';
        return`<td class="tc" style="${bg}">${esc(pick)}${got}</td>`;
      }).join('')}</tr>`;
    }
  });
  return`
    <div class="card">
      <div class="card-title">👁️ Ver todos F2 — pronósticos de los 32</div>
      <p class="sm muted">Cada partido del cuadro, quién pasó de verdad, el pick de cada jugador y los puntos que saca. <b style="background:#dcfce7;padding:0 4px;border-radius:3px">verde</b> acertó · <b style="background:#fef2f2;padding:0 4px;border-radius:3px">rojo</b> falló. Puntos: 16avos 3 · 8avos 6 · cuartos 6 · semis 8 · final 12.</p>
    </div>
    <div class="card" style="padding:10px">
      <div style="overflow:auto;max-height:78vh">
        <table class="pm pm-sheet"><thead>${head}</thead><tbody>${body}</tbody></table>
      </div>
    </div>`;
}

// Cuadro OFICIAL de Fase 2 (Clasificados F2): se va llenando con los resultados reales (en verde el que pasó)
function f2esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function oficialCell(name,winner){
  if(!name)return `<button class="cz-team empty" disabled>Por definir</button>`;
  const cls='cz-team'+(winner&&winner===name?' win':'');
  return `<button class="${cls}" disabled style="cursor:default" title="${f2esc(name)}">${f2esc(name)}</button>`;
}
function buildOficialHTML(){
  let html='<div class="cz-wrap"><div class="cz">';
  ['r1','r2','r3','r4','r5'].forEach((round,ri)=>{
    const slotH=F2_BASE*Math.pow(2,ri),count=BRACKET_COUNTS[round];
    let col=`<div class="cz-col"><div class="cz-h">${F2_SHORT[round]}</div>`;
    for(let i=1;i<=count;i++){
      const mid=round+'m'+i;let tA,tB;
      if(mid.startsWith('r1')){const b=f2bracket[mid]||{};tA=b.home||null;tB=b.away||null;}
      else{const[a,b]=BRACKET_FEED[mid];tA=f2results[a]||null;tB=f2results[b]||null;}
      const win=f2results[mid];
      col+=`<div class="cz-slot" style="height:${slotH}px">`;
      if(ri>0)col+=`<div class="cz-conn" style="height:${slotH/2}px"></div>`;
      col+=`<div class="cz-cell">${oficialCell(tA,win)}${oficialCell(tB,win)}</div></div>`;
    }
    html+=col+'</div>';
  });
  const champ=f2results['r5m1'];
  html+=`<div class="cz-col"><div class="cz-h">🏆 Campeón</div><div class="cz-slot" style="height:${F2_BASE*16}px"><div class="cz-conn1"></div><div class="cz-champ ${champ?'ok':''}">${champ?f2esc(champ):'—'}</div></div></div>`;
  return html+'</div></div>';
}

  let played=0;['r1','r2','r3','r4','r5'].forEach(r=>{for(let i=1;i<=BRACKET_COUNTS[r];i++)if(f2results[r+'m'+i])played++;});
  const champ=f2results['r5m1'];
  return`

// Autocompleta los 16 cruces desde los resultados de grupos y muestra el orden de los terceros.
// NO guarda: llena los campos para que el admin revise/edite y luego toque "Guardar 16avos".
function autollenarF2Bracket(){
  const grpDone=g=>PARTIDOS.filter(m=>m.grupo===g.id).every(m=>{const r=allResults[m.id];return r&&r.home!=null&&r.home!==''&&r.away!=null&&r.away!=='';});
  const completos=GRUPOS.filter(grpDone).length;
  const r=calcularR32Auto();
  for(let i=1;i<=16;i++){
    const mid='r1m'+i,b=r.bracket[mid]||{home:'',away:''};
    const h=document.getElementById('f2h_'+mid),a=document.getElementById('f2a_'+mid);
    if(h)h.value=b.home||'';if(a)a.value=b.away||'';
  }
  const info=document.getElementById('f2autoinfo');
  if(info){
    if(!r.thirdAssign){
      info.innerHTML='<div class="alert alert-err sm mb2">⚠️ No se pudieron asignar los 8 terceros respetando los grupos habilitados. Revisá los cruces a mano.</div>';
    }else{
      const slotWin={};F2_THIRD_SLOTS.forEach(s=>{if(r.thirdAssign[s.r32])slotWin[r.thirdAssign[s.r32]]=s.win;});
      const rows=r.thirds.map((t,i)=>{const q=i<8,gd=(t.GD>=0?'+':'')+t.GD;
        return`<tr style="${q?'':'opacity:.45'}"><td class="tc">${i+1}</td><td>${t.name}</td><td class="tc">${t.groupId}</td><td class="tc bold">${t.Pts}</td><td class="tc">${gd}</td><td class="tc">${t.GF}</td><td class="sm">${q?(slotWin[t.groupId]?('→ 1°'+slotWin[t.groupId]):'✓'):'eliminado'}</td></tr>`;}).join('');
      info.innerHTML=`<div class="alert alert-info sm mb2"><b>Orden de los mejores 3°</b> — criterios: 1) Puntos · 2) Dif. de gol · 3) Goles a favor · 4) conducta (tarjetas) · 5) ranking FIFA. Los 2 últimos no se calculan acá: si dos quedan iguales hasta GF, ajustá a mano. Los 8 mejores se cruzan respetando los grupos habilitados por FIFA (sin revancha del mismo grupo).</div>
      <div style="overflow-x:auto;margin-bottom:10px"><table class="rt" style="font-size:.74rem"><thead><tr><th>#</th><th>3° lugar</th><th>Gr</th><th>Pts</th><th>Dif</th><th>GF</th><th>Cruce</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }
  }
  toast(completos<12?`⚠️ ${completos}/12 grupos completos — revisá los cruces antes de guardar`:'✅ 16avos autocompletados — revisá y guardá','info');
}

// Borra los resultados de los 2 últimos partidos (fecha 3) de cada grupo de Fase 1
async function borrarUltimaFechaGrupos(){
  const targets=[];
  for(const g of GRUPOS){
    const ms=PARTIDOS.filter(m=>m.grupo===g.id).slice().sort((a,b)=>{
      const da=a.date.split('/').reverse().join(''),db=b.date.split('/').reverse().join('');
      if(da!==db)return da<db?-1:1;return a.time<b.time?-1:1;
    });
    ms.slice(-2).forEach(m=>targets.push(m.id));
  }
  const have=targets.filter(id=>allResults[id]);
  if(!have.length){toast('No hay resultados cargados en la última fecha de los grupos','info');return;}
  if(!confirm(`¿Borrar los resultados de los ${have.length} partidos de la última fecha (los 2 últimos de cada grupo)? Se recalculan tablas, clasificados y el cuadro. No se puede deshacer.`))return;
  const saved={...allResults};
  targets.forEach(id=>{delete saved[id];});
  await dbSet('results',saved);
  allResults=saved;recomputeF2Bracket();
  toast(`🗑️ Borrados ${have.length} resultados de la última fecha`,'ok');
  renderApp();
}
async function clearResults(){
  const n=PARTIDOS.filter(m=>allResults[m.id]).length;
  if(n===0){toast('No hay resultados cargados','info');return;}
  if(!confirm(`¿Borrar TODOS los resultados cargados (${n})? Esto vacía los marcadores y los puntajes vuelven a cero. No se puede deshacer.`))return;
  await dbSet('results',{});
  allResults={};recomputeF2Bracket();
  toast('🗑️ Todos los resultados fueron borrados','ok');
  renderApp();
}

async function saveResults(){
  const saved={...allResults};
  for(const m of PARTIDOS){
    const hEl=document.getElementById('rh_'+m.id),aEl=document.getElementById('ra_'+m.id);
    if(hEl&&aEl&&hEl.value!==''&&aEl.value!=='')saved[m.id]={home:+hEl.value,away:+aEl.value};
  }
  await dbSet('results',saved);allResults=saved;recomputeF2Bracket();
  toast(todosGruposCompletos()?'✅ Resultados guardados — 16avos generados automáticamente':'✅ Resultados guardados','ok');
}

  const pass=document.getElementById('nPass').value||'';
  if(!name||!user||!pass){toast('Completá todos los campos','err');return;}
  if(Object.values(allUsers).some(u=>(u.username||'').toLowerCase()===user)){toast('Ese usuario ya existe','err');return;}
  const hash=await hashPwd(pass);
  const uid=`u_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
  const nu={username:user,passwordHash:hash,displayName:name,isAdmin:false,createdAt:Date.now()};
  await dbSet(`users/${uid}`,nu);allUsers[uid]=nu;
  toast(`✅ ${name} agregado`,'ok');renderApp();
}

async function delUser(uid,name){
  if(!confirm(`¿Eliminar a ${name}? Se borrarán también sus pronósticos.`))return;
  await dbDel(`users/${uid}`);await dbDel(`preds/${uid}`);
  delete allUsers[uid];delete allPreds[uid];
  toast(`${name} eliminado`,'info');renderApp();
}

async function resetPwd(uid){
  const p=prompt('Nueva contraseña:');if(!p)return;
  const hash=await hashPwd(p);
  await dbSet(`users/${uid}/passwordHash`,hash);
  allUsers[uid].passwordHash=hash;
  if(currentUser.id===uid){currentUser.passwordHash=hash;sessionStorage.setItem('pm26_user',JSON.stringify(currentUser));}
  toast('Contraseña actualizada','ok');
}

async function toggleLock(){
  const next=!appCfg.locked;
  if(!confirm(next?'¿Cerrar pronósticos? Todos podrán ver los pronósticos de los demás.':'¿Abrir pronósticos nuevamente?'))return;
  appCfg.locked=next;
  await dbSet('config/locked',next);
  toast(next?'🔒 Pronósticos cerrados':'🔓 Pronósticos abiertos','info');
  renderApp();
}

// Exportar
function exportJSON(){
  dl('prodemu2026_backup.json',JSON.stringify({exportDate:new Date().toISOString(),users:allUsers,preds:allPreds,results:allResults,config:appCfg},null,2),'application/json');
}
function exportCSV(){
  const rows=[['#','Nombre','Usuario','Puntos','Resultados','Exactos','Jugados','Pronósticos','Pago']];
  Object.entries(allUsers).filter(([,u])=>!u.isAdmin)
    .map(([uid,u])=>({name:u.displayName||u.username,user:u.username,done:countDone(uid),paid:u.paid?'Sí':'No',...userScore(uid)}))
    .sort((a,b)=>b.t-a.t||b.e-a.e)
    .forEach((s,i)=>rows.push([i+1,`"${s.name}"`,s.user,s.t,s.r,s.e,s.played,s.done,s.paid]));
  dl('prodemu2026_ranking.csv',rows.map(r=>r.join(',')).join('\n'),'text/csv');
}
function exportMatrix(){
  const players=Object.entries(allUsers).filter(([,u])=>!u.isAdmin);
  const rows=[['Grupo','Local','Visitante','Resultado',...players.map(([,u])=>u.displayName||u.username)]];
  for(const m of PARTIDOS){
    const res=allResults[m.id];
    rows.push([m.groupName,m.home,m.away,res?`${res.home}-${res.away}`:'',
      ...players.map(([uid])=>{const p=(allPreds[uid]||{})[m.id];return p?`${p.home}-${p.away}`:'';})]);
  }
  dl('prodemu2026_matriz.csv',rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n'),'text/csv');
}
function dl(name,content,mime){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:mime}));
  a.download=name;a.click();
}
</script>
